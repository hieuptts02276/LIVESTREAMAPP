<!doctype html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>LivestreamApp 2026</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="assets/style.css" rel="stylesheet">
</head>
<body class="bg-light">
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container">
    <a class="navbar-brand" href="index.html">LivestreamApp</a>
  </div>
</nav>
<main class="container py-4">
  <div class="p-4 mb-4 bg-white rounded-3 shadow-sm">
    <h1 class="display-6">Ứng dụng Livestream đa tính năng (2025–2026)</h1>
    <p class="lead mb-0">Mỗi xu hướng là một trang riêng, có thể dùng thực tế bằng Web API + dữ liệu cục bộ.</p>
  </div>
  <div class="row g-3" id="pages"></div>
</main>
<script>
const features = [
['1. Live Commerce','pages/live-commerce.html','Mua ngay, giỏ hàng, voucher, chốt đơn'],
['2. AI hỗ trợ livestream','pages/ai-assistant.html','Auto-reply comment, gợi ý nội dung, MC ảo'],
['3. Virtual Streamer','pages/virtual-streamer.html','Avatar ảo điều khiển bằng mic + camera'],
['4. Tương tác real-time','pages/realtime-interaction.html','Danmaku, reaction, poll realtime'],
['5. Cá nhân hóa nội dung','pages/personalization.html','Đề xuất live theo hành vi'],
['6. Multi-camera','pages/multi-camera.html','Nhiều góc quay và chuyển camera'],
['7. Co-host nhiều người','pages/cohost.html','WebRTC co-host 2 người'],
['8. Gamification','pages/gamification.html','Quà tặng, mini game, leaderboard'],
['9. Livestream mộc','pages/authentic-live.html','Quay nhanh bằng điện thoại/webcam'],
['10. Xác minh & kiểm soát','pages/verification.html','KYC cơ bản + kiểm duyệt từ khóa']
];
const c = document.getElementById('pages');
features.forEach(([title,link,desc])=>{
  c.insertAdjacentHTML('beforeend',`<div class="col-md-6 col-lg-4"><div class="card h-100 shadow-sm"><div class="card-body d-flex flex-column"><h5 class="card-title">${title}</h5><p class="card-text">${desc}</p><a class="btn btn-primary mt-auto" href="${link}">Mở tính năng</a></div></div></div>`)
})
</script>
</body>
</html>
