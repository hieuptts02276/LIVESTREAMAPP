<!doctype html><html lang="vi"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Authentic Live</title><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"><link href="../assets/style.css" rel="stylesheet"></head><body class="bg-light"><div class="container py-3"><div class="d-flex justify-content-between mb-3"><h2>📱 Livestream mộc</h2><a href="../index.html" class="btn btn-outline-secondary">Trang chủ</a></div><div class="card"><div class="card-body"><div class="video-box"><video id="cam" autoplay muted playsinline></video></div><div class="mt-2 d-flex gap-2"><button id="go" class="btn btn-primary">Bắt đầu live 1 chạm</button><button id="flip" class="btn btn-outline-primary">Đổi trước/sau (mobile)</button><button id="beauty" class="btn btn-outline-secondary">Filter nhẹ</button></div><p id="net" class="small mt-2"></p></div></div></div><script>
let mode='user',stream,filtered=false;
async function start(){if(stream) stream.getTracks().forEach(t=>t.stop());stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:mode},audio:true});cam.srcObject=stream;net.textContent='Kết nối: '+(navigator.connection?.effectiveType||'unknown')+', độ trễ thấp: '+(!(navigator.connection?.saveData));}
go.onclick=start;flip.onclick=()=>{mode=mode==='user'?'environment':'user';start()};beauty.onclick=()=>{filtered=!filtered;cam.style.filter=filtered?'contrast(1.05) saturate(1.1) brightness(1.04)':'none'}
</script></body></html>
