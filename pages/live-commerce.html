<!doctype html><html lang="vi"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Live Commerce</title><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"><link href="../assets/style.css" rel="stylesheet"></head><body class="bg-light"><div class="container py-3"><div class="page-header mb-3"><h2>🔥 Live Commerce</h2><a href="../index.html" class="btn btn-outline-secondary">Trang chủ</a></div><div class="row g-3"><div class="col-lg-8"><div class="card"><div class="card-body"><div class="video-box mb-3"><video id="live" autoplay muted playsinline></video><div class="position-absolute top-0 start-0 p-2 text-white bg-dark bg-opacity-50">LIVE: Shop cùng streamer</div></div><button class="btn btn-sm btn-primary" id="startCam">Bật camera live</button><hr><div id="productList" class="row g-2"></div></div></div></div><div class="col-lg-4"><div class="card"><div class="card-body"><h5>🛒 Giỏ hàng</h5><ul id="cart" class="list-group mb-2"></ul><input id="voucher" class="form-control mb-2" placeholder="Nhập voucher (SALE10)"><button id="checkout" class="btn btn-success w-100">Mua ngay</button><p class="mt-2 mb-0 fw-bold" id="total">Tổng: 0đ</p></div></div><div class="card mt-3"><div class="card-body"><h6>Hỏi đáp nhanh</h6><div class="input-group"><input id="q" class="form-control" placeholder="Hỏi streamer..."><button id="ask" class="btn btn-outline-primary">Gửi</button></div><div id="qa" class="small mt-2"></div></div></div></div></div></div><script>
const products=[{id:1,name:'Serum C',price:199000},{id:2,name:'Đèn livestream',price:350000},{id:3,name:'Mic không dây',price:690000}];
let cart=[];
function vnd(n){return n.toLocaleString('vi-VN')+'đ'}
productList.innerHTML=products.map(p=>`<div class='col-md-4'><div class='border rounded p-2 h-100'><strong>${p.name}</strong><div>${vnd(p.price)}</div><button class='btn btn-sm btn-warning mt-2' onclick='add(${p.id})'>Thêm giỏ</button></div></div>`).join('');
window.add=id=>{const p=products.find(x=>x.id===id);cart.push(p);render()}
function render(){cart.innerHTML=cart.map((p,i)=>`<li class='list-group-item d-flex justify-content-between'>${p.name}<button class='btn btn-sm btn-danger' onclick='delItem(${i})'>x</button></li>`).join('');let sum=cart.reduce((a,b)=>a+b.price,0);if(voucher.value==='SALE10') sum*=0.9;total.textContent='Tổng: '+vnd(Math.round(sum));}
window.delItem=i=>{cart.splice(i,1);render()}
voucher.oninput=render;
checkout.onclick=()=>{if(!cart.length) return alert('Giỏ hàng trống'); const orders=JSON.parse(localStorage.orders||'[]');orders.push({time:new Date().toISOString(),items:cart,total:total.textContent});localStorage.orders=JSON.stringify(orders);alert('Đặt hàng thành công!');cart=[];render();}
ask.onclick=()=>{if(!q.value) return;qa.innerHTML=`<div>👤 ${q.value}</div><div class='text-success'>🎤 Streamer: Mình đã pin sản phẩm phù hợp ở phía dưới nhé!</div>`;q.value=''}
startCam.onclick=async()=>{try{live.srcObject=await navigator.mediaDevices.getUserMedia({video:true,audio:true});}catch(e){alert('Không bật được camera: '+e.message)}}
render();
</script></body></html>
