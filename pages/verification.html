<!doctype html><html lang="vi"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Xác minh & kiểm duyệt</title><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"></head><body class="bg-light"><div class="container py-3"><div class="d-flex justify-content-between mb-3"><h2>🔐 Xác minh & kiểm soát nội dung</h2><a href="../index.html" class="btn btn-outline-secondary">Trang chủ</a></div><div class="row g-3"><div class="col-md-6"><div class="card"><div class="card-body"><h5>Xác minh danh tính streamer</h5><input id="fullName" class="form-control mb-2" placeholder="Họ tên"><input id="idNo" class="form-control mb-2" placeholder="Số CCCD/Hộ chiếu"><button id="verify" class="btn btn-primary">Xác minh</button><div id="kyc" class="small mt-2"></div></div></div></div><div class="col-md-6"><div class="card"><div class="card-body"><h5>Kiểm duyệt bình luận</h5><textarea id="cm" class="form-control" rows="5" placeholder="Nhập bình luận..."></textarea><button id="mod" class="btn btn-warning mt-2">Quét vi phạm</button><div id="modOut" class="small mt-2"></div></div></div></div></div><div class="card mt-3"><div class="card-body"><h5>Lưu dữ liệu live</h5><button id="archive" class="btn btn-success">Lưu phiên live hiện tại</button><pre id="archOut" class="small mt-2"></pre></div></div></div><script>
const banned=['lừa đảo','cờ bạc','18+'];
async function sha256(t){const b=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(t));return [...new Uint8Array(b)].map(x=>x.toString(16).padStart(2,'0')).join('')}
verify.onclick=async()=>{if(!fullName.value||!idNo.value)return;const hash=await sha256(idNo.value);localStorage.kyc=JSON.stringify({name:fullName.value,idHash:hash,date:new Date().toISOString()});kyc.textContent='✅ Đã xác minh, mã băm ID: '+hash.slice(0,16)+'...'};
mod.onclick=()=>{const t=cm.value.toLowerCase();const hits=banned.filter(w=>t.includes(w));modOut.textContent=hits.length?('⚠️ Phát hiện từ cấm: '+hits.join(', ')):'✅ Nội dung an toàn'};
archive.onclick=()=>{const arr=JSON.parse(localStorage.archives||'[]');arr.push({time:new Date().toISOString(),network:navigator.connection?.effectiveType||'unknown',viewerEstimate:Number(localStorage.viewerCount||0)});localStorage.archives=JSON.stringify(arr);archOut.textContent=JSON.stringify(arr,null,2)}
</script></body></html>
