<!doctype html><html lang="vi"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Multi-camera</title><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"><link href="../assets/style.css" rel="stylesheet"></head><body class="bg-light"><div class="container py-3"><div class="d-flex justify-content-between mb-3"><h2>🎥 Multi-camera</h2><a href="../index.html" class="btn btn-outline-secondary">Trang chủ</a></div><div class="row g-3"><div class="col-md-8"><div class="video-box"><video id="main" autoplay playsinline muted></video><video id="pip" autoplay playsinline muted style="position:absolute;right:12px;bottom:12px;width:30%;border:2px solid #fff;border-radius:8px"></video></div></div><div class="col-md-4"><select id="cam1" class="form-select mb-2"></select><select id="cam2" class="form-select mb-2"></select><button id="start" class="btn btn-primary w-100 mb-2">Bật 2 góc quay</button><button id="swap" class="btn btn-warning w-100">Đổi góc chính/phụ</button></div></div></div><script>
let s1,s2;async function load(){const ds=(await navigator.mediaDevices.enumerateDevices()).filter(d=>d.kind==='videoinput');cam1.innerHTML=cam2.innerHTML=ds.map(d=>`<option value='${d.deviceId}'>${d.label||'Camera'}</option>`).join('');if(ds[1]) cam2.selectedIndex=1;}load();
start.onclick=async()=>{if(s1) s1.getTracks().forEach(t=>t.stop());if(s2) s2.getTracks().forEach(t=>t.stop());s1=await navigator.mediaDevices.getUserMedia({video:{deviceId:{exact:cam1.value}},audio:true});s2=await navigator.mediaDevices.getUserMedia({video:{deviceId:{exact:cam2.value}},audio:false});main.srcObject=s1;pip.srcObject=s2};
swap.onclick=()=>{[main.srcObject,pip.srcObject]=[pip.srcObject,main.srcObject]}
</script></body></html>
