<!doctype html><html lang="vi"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Virtual Streamer</title><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"><link href="../assets/style.css" rel="stylesheet"></head><body class="bg-light"><div class="container py-3"><div class="page-header mb-3"><h2>🎭 Virtual Streamer (Avatar)</h2><a href="../index.html" class="btn btn-outline-secondary">Trang chủ</a></div><div class="card"><div class="card-body"><div class="row g-3"><div class="col-md-7"><div class="video-box"><canvas id="avatar"></canvas></div></div><div class="col-md-5"><button id="start" class="btn btn-primary">Kích hoạt mic + camera</button><p class="small mt-2">Avatar nháy miệng theo âm lượng mic, xoay đầu theo vị trí chuột trên canvas.</p><div class="form-check form-switch"><input class="form-check-input" type="checkbox" id="alwaysOn"><label class="form-check-label" for="alwaysOn">Chế độ 24/7 (tự nói mỗi 30s)</label></div><div id="log" class="small mt-2"></div></div></div></div></div></div><script>
const canvas=avatar,ctx=canvas.getContext('2d');function resize(){canvas.width=canvas.clientWidth;canvas.height=canvas.clientHeight;}addEventListener('resize',resize);resize();
let amp=0,tx=0.5,ty=0.5,timer;
canvas.onmousemove=e=>{const r=canvas.getBoundingClientRect();tx=(e.clientX-r.left)/r.width;ty=(e.clientY-r.top)/r.height};
function draw(){ctx.fillStyle='#1f2937';ctx.fillRect(0,0,canvas.width,canvas.height);const x=canvas.width/2+(tx-0.5)*40,y=canvas.height/2+(ty-0.5)*20;ctx.fillStyle='#fbbf24';ctx.beginPath();ctx.arc(x,y,90,0,Math.PI*2);ctx.fill();ctx.fillStyle='#111';ctx.beginPath();ctx.arc(x-30,y-20,8,0,Math.PI*2);ctx.arc(x+30,y-20,8,0,Math.PI*2);ctx.fill();ctx.strokeStyle='#111';ctx.lineWidth=6;ctx.beginPath();ctx.moveTo(x-35,y+30);ctx.quadraticCurveTo(x,y+30+amp*120,x+35,y+30);ctx.stroke();requestAnimationFrame(draw)}draw();
start.onclick=async()=>{try{const stream=await navigator.mediaDevices.getUserMedia({audio:true,video:true});const ac=new AudioContext();const src=ac.createMediaStreamSource(stream);const an=ac.createAnalyser();an.fftSize=256;src.connect(an);const arr=new Uint8Array(an.frequencyBinCount);setInterval(()=>{an.getByteFrequencyData(arr);amp=arr.reduce((a,b)=>a+b,0)/arr.length/255;},60);log.textContent='✅ Đã kích hoạt avatar ảo.';}catch(e){log.textContent='❌ '+e.message}};
alwaysOn.onchange=()=>{clearInterval(timer);if(alwaysOn.checked){timer=setInterval(()=>{const u=new SpeechSynthesisUtterance('Xin chào, mình là virtual streamer đang online.');u.lang='vi-VN';speechSynthesis.speak(u)},30000)}}
</script></body></html>
