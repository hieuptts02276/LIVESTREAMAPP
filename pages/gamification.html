<!doctype html><html lang="vi"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Gamification</title><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"></head><body class="bg-light"><div class="container py-3"><div class="d-flex justify-content-between mb-3"><h2>🎮 Gamification</h2><a href="../index.html" class="btn btn-outline-secondary">Trang chủ</a></div><div class="row g-3"><div class="col-md-6"><div class="card"><div class="card-body"><h5>Tặng quà</h5><input id="name" class="form-control mb-2" placeholder="Tên người xem"><div class="d-flex gap-2"><button class="btn btn-danger gift" data-p="10">❤️ 10đ</button><button class="btn btn-warning gift" data-p="50">🎁 50đ</button><button class="btn btn-success gift" data-p="100">🚀 100đ</button></div><div id="fx" class="mt-3 fs-4"></div></div></div></div><div class="col-md-6"><div class="card"><div class="card-body"><h5>Leaderboard donate</h5><ol id="board"></ol><button id="quiz" class="btn btn-primary">Mini game: Câu hỏi nhanh</button><div id="quizOut" class="small mt-2"></div></div></div></div></div></div><script>
let lb=JSON.parse(localStorage.lb||'{}');function render(){board.innerHTML=Object.entries(lb).sort((a,b)=>b[1]-a[1]).slice(0,10).map(([n,p])=>`<li>${n}: ${p}đ</li>`).join('')}
function add(p){const n=name.value||'Ẩn danh';lb[n]=(lb[n]||0)+p;localStorage.lb=JSON.stringify(lb);fx.textContent='✨ Hiệu ứng quà đã kích hoạt!';setTimeout(()=>fx.textContent='',1200);render()}
document.querySelectorAll('.gift').forEach(b=>b.onclick=()=>add(+b.dataset.p));
quiz.onclick=()=>{const ans=prompt('Mini game: 2 + 2 = ?');quizOut.textContent=(ans==='4')?'🎉 Đúng! +20 điểm thưởng cho bạn.':'Chưa đúng, thử lại lần sau.';if(ans==='4') add(20)};render();
</script></body></html>
