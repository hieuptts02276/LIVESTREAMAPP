<!doctype html><html lang="vi"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Cá nhân hóa</title><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"></head><body class="bg-light"><div class="container py-3"><div class="d-flex justify-content-between mb-3"><h2>🧠 Cá nhân hóa nội dung</h2><a href="../index.html" class="btn btn-outline-secondary">Trang chủ</a></div><div class="row g-3"><div class="col-md-7"><div class="card"><div class="card-body"><h5>Danh sách live</h5><div id="feeds"></div></div></div></div><div class="col-md-5"><div class="card"><div class="card-body"><h5>Hành vi người xem</h5><pre id="profile" class="small"></pre><button id="reset" class="btn btn-sm btn-danger">Reset lịch sử</button></div></div></div></div></div><script>
const lives=[{id:1,title:'Skincare tối giản',tags:['beauty','authentic']},{id:2,title:'PK game MOBA',tags:['game','battle']},{id:3,title:'Chốt deal gia dụng',tags:['commerce','home']},{id:4,title:'VTuber kể chuyện',tags:['virtual','fun']}];
let hist=JSON.parse(localStorage.watchHist||'{}');
function score(l){return l.tags.reduce((s,t)=>s+(hist[t]||0),0)}
function render(){const sorted=[...lives].sort((a,b)=>score(b)-score(a));feeds.innerHTML=sorted.map(l=>`<div class='border rounded p-2 mb-2'><b>${l.title}</b><div class='small text-muted'>${l.tags.join(', ')}</div><button class='btn btn-sm btn-primary mt-1' onclick='watch(${l.id})'>Xem live</button></div>`).join('');profile.textContent=JSON.stringify(hist,null,2)}
window.watch=id=>{const live=lives.find(x=>x.id===id);live.tags.forEach(t=>hist[t]=(hist[t]||0)+1);localStorage.watchHist=JSON.stringify(hist);render()}
reset.onclick=()=>{hist={};localStorage.removeItem('watchHist');render()};render();
</script></body></html>
