<!doctype html><html lang="vi"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Realtime Interaction</title><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"><link href="../assets/style.css" rel="stylesheet"></head><body class="bg-light"><div class="container py-3"><div class="page-header mb-3"><h2>💬 Tương tác real-time</h2><a href="../index.html" class="btn btn-outline-secondary">Trang chủ</a></div><div class="row g-3"><div class="col-lg-8"><div class="video-box" id="stage"><video id="v" autoplay muted playsinline></video></div><button id="cam" class="btn btn-primary mt-2">Bật camera</button></div><div class="col-lg-4"><input id="msg" class="form-control mb-2" placeholder="Danmaku..."/><button id="send" class="btn btn-info w-100 mb-2">Gửi comment nổi</button><div class="d-flex gap-2 mb-2"><button class="btn btn-danger flex-fill react" data-e="❤️">Tim</button><button class="btn btn-warning flex-fill react" data-e="🎁">Quà</button><button class="btn btn-success flex-fill react" data-e="👏">Vỗ tay</button></div><div class="card"><div class="card-body"><h6>Poll trực tiếp</h6><p class="mb-1">Bạn thích nội dung nào?</p><button class="btn btn-sm btn-outline-primary poll" data-v="A">A. Review sản phẩm</button>
<button class="btn btn-sm btn-outline-primary poll" data-v="B">B. Q&A</button><div id="pollRs" class="small mt-2"></div></div></div></div></div></div><script>
const ch=new BroadcastChannel('live-rt');let poll=JSON.parse(localStorage.poll||'{"A":0,"B":0}');
function renderPoll(){const t=poll.A+poll.B||1;pollRs.innerHTML=`A: ${poll.A} (${Math.round(poll.A*100/t)}%)<br>B: ${poll.B} (${Math.round(poll.B*100/t)}%)`}
renderPoll();
cam.onclick=async()=>{v.srcObject=await navigator.mediaDevices.getUserMedia({video:true,audio:true})}
send.onclick=()=>{ch.postMessage({type:'dm',text:msg.value});msg.value=''}
document.querySelectorAll('.react').forEach(b=>b.onclick=()=>ch.postMessage({type:'react',e:b.dataset.e}));
document.querySelectorAll('.poll').forEach(b=>b.onclick=()=>{poll[b.dataset.v]++;localStorage.poll=JSON.stringify(poll);renderPoll();ch.postMessage({type:'poll',poll})});
ch.onmessage=e=>{const d=e.data;if(d.type==='dm'&&d.text){const n=document.createElement('div');n.className='danmaku';n.style.top=Math.random()*70+'%';n.textContent=d.text;stage.appendChild(n);setTimeout(()=>n.remove(),8000)}
if(d.type==='react'){const n=document.createElement('div');n.className='float-reaction';n.style.left=(10+Math.random()*80)+'%';n.textContent=d.e;stage.appendChild(n);setTimeout(()=>n.remove(),2000)}
if(d.type==='poll'){poll=d.poll;renderPoll();}}
</script></body></html>
