<!doctype html><html lang="vi"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Co-host</title><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"><link href="../assets/style.css" rel="stylesheet"></head><body class="bg-light"><div class="container py-3"><div class="d-flex justify-content-between mb-3"><h2>🧑‍🤝‍🧑 Co-host 2 người (WebRTC)</h2><a href="../index.html" class="btn btn-outline-secondary">Trang chủ</a></div><p class="small">Mở trang này ở 2 tab. Một tab bấm <b>Tạo phòng</b>, tab còn lại bấm <b>Tham gia</b>.</p><div class="row g-3"><div class="col-md-6"><div class="video-box"><video id="local" autoplay muted playsinline></video></div></div><div class="col-md-6"><div class="video-box"><video id="remote" autoplay playsinline></video></div></div></div><div class="mt-2 d-flex gap-2"><button id="create" class="btn btn-primary">Tạo phòng</button><button id="join" class="btn btn-success">Tham gia</button><span id="status" class="align-self-center"></span></div></div><script>
const bc=new BroadcastChannel('webrtc-room');let pc,localStream;
async function init(){localStream=await navigator.mediaDevices.getUserMedia({video:true,audio:true});local.srcObject=localStream;}
function setup(){pc=new RTCPeerConnection({iceServers:[{urls:'stun:stun.l.google.com:19302'}]});localStream.getTracks().forEach(t=>pc.addTrack(t,localStream));pc.ontrack=e=>remote.srcObject=e.streams[0];pc.onicecandidate=e=>e.candidate&&bc.postMessage({type:'ice',c:e.candidate});}
bc.onmessage=async({data:d})=>{if(!pc||d.type==='offer'&&!d.sdp)return; if(d.type==='offer'){setup();await pc.setRemoteDescription(d.sdp);const ans=await pc.createAnswer();await pc.setLocalDescription(ans);bc.postMessage({type:'answer',sdp:pc.localDescription});status.textContent='Đã nhận offer';}
if(d.type==='answer'){await pc.setRemoteDescription(d.sdp);status.textContent='Đã kết nối';}
if(d.type==='ice'&&pc.remoteDescription){await pc.addIceCandidate(d.c);}};
create.onclick=async()=>{await init();setup();const offer=await pc.createOffer();await pc.setLocalDescription(offer);bc.postMessage({type:'offer',sdp:pc.localDescription});status.textContent='Đã tạo phòng';};
join.onclick=async()=>{await init();status.textContent='Đang chờ offer...';}
</script></body></html>
