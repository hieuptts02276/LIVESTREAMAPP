<!doctype html><html lang="vi"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>AI hỗ trợ</title><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"><link href="../assets/style.css" rel="stylesheet"></head><body class="bg-light"><div class="container py-3"><div class="page-header mb-3"><h2>🤖 AI hỗ trợ livestream</h2><a class="btn btn-outline-secondary" href="../index.html">Trang chủ</a></div><div class="row g-3"><div class="col-md-6"><div class="card"><div class="card-body"><h5>Auto-reply comment</h5><textarea id="comments" class="form-control" rows="5" placeholder="Mỗi dòng là 1 comment..."></textarea><button id="autoReply" class="btn btn-primary mt-2">Phân tích & trả lời</button><div id="replies" class="mt-2 small"></div></div></div></div><div class="col-md-6"><div class="card"><div class="card-body"><h5>Gợi ý nội dung khi live</h5><input id="topic" class="form-control" placeholder="Ví dụ: skincare mùa hè"><button id="suggest" class="btn btn-success mt-2">Gợi ý script</button><ul id="ideas" class="mt-2"></ul></div></div><div class="card mt-3"><div class="card-body"><h5>MC ảo đọc nội dung</h5><textarea id="speechText" class="form-control" rows="3">Xin chào mọi người, hôm nay mình review sản phẩm rất hot!</textarea><button id="speak" class="btn btn-warning mt-2">Phát giọng nói AI (TTS)</button></div></div></div></div></div><script>
const rules=[[/giá|bao nhiêu/,'Giá đang ưu đãi trong live, bạn bấm nút mua ngay để thấy giá mới nhất nhé!'],[/ship|vận chuyển/,'Shop hỗ trợ giao nhanh toàn quốc ạ.'],[/thật|fake|chính hãng/,'Bên mình cam kết hàng chính hãng, có hóa đơn và đổi trả rõ ràng.']];
autoReply.onclick=()=>{const lines=comments.value.split('\n').filter(Boolean);replies.innerHTML=lines.map(c=>{const r=(rules.find(([re])=>re.test(c.toLowerCase()))||[])[1]||'Cảm ơn bạn đã bình luận, mình sẽ trả lời ngay trên live!';return `<div>💬 ${c}<br><span class='text-success'>🤖 ${r}</span></div><hr>`}).join('')};
suggest.onclick=()=>{const t=topic.value||'sản phẩm';const blocks=[`Hook 15s: Nêu vấn đề người xem gặp với ${t}.`,`Demo 60s: Dùng trực tiếp trên live và so sánh trước/sau.`,`CTA 15s: Nhắc voucher + số lượng giới hạn.`];ideas.innerHTML=blocks.map(x=>`<li>${x}</li>`).join('')};
speak.onclick=()=>{const u=new SpeechSynthesisUtterance(speechText.value);u.lang='vi-VN';speechSynthesis.cancel();speechSynthesis.speak(u)}
</script></body></html>
